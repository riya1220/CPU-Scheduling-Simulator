<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CPU Scheduling Simulator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
     body {
      background: url('https://images.unsplash.com/photo-1664070719324-c0a6a02ce364?q=80&w=2128&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }
    .glass-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      margin-top: 50px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      animation: fadeIn 1s ease-in-out;
    }
    h2 {
      font-weight: bold;
      text-shadow: 1px 1px 2px #000;
    }
    label, th, td, small {
      color: #fff;
    }
    .btn-primary, .btn-success {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .btn-primary:hover, .btn-success:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
    }
    table {
      background: rgba(255, 255, 255, 0.05);
    }
    #ganttChart {
      background: #fff;
      border-radius: 15px;
      padding: 10px;
      animation: fadeInUp 1s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes highlight {
      0% { background-color: #ffffcc; }
      100% { background-color: transparent; }
    }
    tr.new-highlight {
      animation: highlight 2s ease forwards;
    }
  </style>
</head>
<body>
  <div class="container glass-container animate__animated animate__fadeIn">
    <h2 class="mb-4 text-center animate__animated animate__fadeInDown">⚙️ CPU Scheduler Simulator</h2>

    <form id="schedulerForm" class="row g-3 animate__animated animate__fadeInUp">
      <div class="col-md-3">
        <label for="algorithm" class="form-label">Algorithm</label>
        <select name="algorithm" id="algorithm" class="form-select">
          <option>FCFS</option>
          <option>SJF</option>
          <option>Priority</option>
          <option>RR</option>
        </select>
      </div>
      <div class="col-md-3 d-none" id="quantumInput">
        <label for="quantum" class="form-label">Quantum</label>
        <input type="number" name="quantum" id="quantum" class="form-control" value="2" min="1" />
      </div>
      <div class="col-md-3 d-flex align-items-end">
        <button type="button" class="btn btn-primary w-100" id="addProcessBtn">
          <i class="bi bi-plus-circle"></i> Add Process
        </button>
      </div>

      <div class="col-12">
        <table id="processTable" class="table table-striped table-bordered table-hover text-white">
          <thead class="table-dark">
            <tr>
              <th>PID</th>
              <th>Arrival Time</th>
              <th>Burst Time</th>
              <th class="priority-header d-none">Priority</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="col-12 d-flex justify-content-center">
        <button type="submit" class="btn btn-success btn-lg">
          <i class="bi bi-play-fill"></i> Run Simulation
        </button>
        <button type="button" class="btn btn-info btn-lg ms-2" id="suggestBtn">
          <i class="bi bi-lightbulb"></i> Suggest Best Algorithm
        </button>
      </div>
    </form>

    <div id="output" class="mt-4 animate__animated animate__fadeInUp"></div>
    <canvas id="ganttChart" class="mt-4"></canvas>

    <div id="suggestionOutput" class="mt-3 text-center text-warning fs-5"></div>

    <div class="text-center text-light mt-4">
      <small>Choose an algorithm, add processes, and visualize the CPU scheduling timeline.</small>
    </div>
  </div>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
